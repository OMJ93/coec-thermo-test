<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thermo Dataset + TN Solver</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; line-height: 1.5; }
    .row { margin-bottom: 12px; }
    label { display: inline-block; width: 240px; vertical-align: top; }
    input, textarea, button { padding: 6px 8px; }
    textarea { width: 420px; height: 140px; font-family: monospace; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 8px; overflow: auto; }
    h2 { margin-top: 28px; }
  </style>
</head>
<body>
  <h1>Thermo Dataset + TN Solver</h1>

  <h2>Thermo condition</h2>

  <div class="row">
    <label for="T_C">T_C</label>
    <input id="T_C" type="number" value="750" />
  </div>

  <div class="row">
    <label for="ratio">ratio_h2o_to_co2</label>
    <input id="ratio" type="number" step="0.1" value="4.0" />
  </div>

  <div class="row">
    <label for="conversion">conversion</label>
    <input id="conversion" type="number" step="0.1" value="0.6" />
  </div>

  <div class="row">
    <label for="air_ratio">air_outlet_o2_n2_ratio</label>
    <input id="air_ratio" type="number" step="0.1" value="0.5" />
  </div>

  <div class="row">
    <label for="j_query">j_A_cm2 for interpolation test</label>
    <input id="j_query" type="number" step="0.01" value="0.73" />
  </div>

  <h2>Stack setting</h2>

  <div class="row">
    <label for="n_cells">n_cells</label>
    <input id="n_cells" type="number" step="1" value="100000" />
  </div>

  <div class="row">
    <label for="area_cm2">area_cm2</label>
    <input id="area_cm2" type="number" step="0.1" value="100" />
  </div>

  <h2>IV points</h2>
  <div class="row">
    <label for="iv_points">j_A_cm2, V_V (one pair per line)</label>
    <textarea id="iv_points">0.0, 1.30
0.2, 1.34
0.4, 1.39
0.6, 1.45
0.8, 1.52
1.0, 1.60
1.2, 1.69
1.4, 1.79</textarea>
  </div>

  <div class="row">
    <button id="runBtn">Run interpolation</button>
    <button id="tnBtn">Find TN point</button>
  </div>

  <h2>Result</h2>
  <pre id="output">Loading...</pre>

  <script type="module" src="./thermo.js"></script>
</body>
</html>
